name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK 36
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        # Remove -x flags and uncomment env below to include browser tests via Karma
        run: ./gradlew check -x jsTest -x wasmJsTest
        # env:
        #   CHROME_BIN: /usr/bin/google-chrome-stable
